# Screaming BedWars Shop - Hypixel Style
# ========================================
# Category layout mimics Hypixel BedWars shop

shop:
  rows: 6
  render-actual-rows: 6
  render-offset: 0
  render-header-start: 0
  render-footer-start: 45
  items-on-row: 9
  show-page-numbers: false
  name: "&8Quick Buy"

  # Category items (top row)
  categories:
    - name: "&aQuick Buy"
      material: NETHER_STAR
      position: 0
    - name: "&6Blocks"
      material: TERRACOTTA
      position: 1
    - name: "&cMelee"
      material: GOLDEN_SWORD
      position: 2
    - name: "&bArmor"
      material: CHAINMAIL_BOOTS
      position: 3
    - name: "&eTools"
      material: STONE_PICKAXE
      position: 4
    - name: "&dRanged"
      material: BOW
      position: 5
    - name: "&5Potions"
      material: BREWING_STAND
      position: 6
    - name: "&2Utility"
      material: TNT
      position: 7

  # ==================== BLOCKS CATEGORY ====================
  blocks:
    - material: WHITE_WOOL
      amount: 16
      price: 4
      price-type: iron
      name: "&fWool"
    - material: TERRACOTTA
      amount: 16
      price: 12
      price-type: iron
      name: "&6Hardened Clay"
    - material: PLANKS
      amount: 16
      price: 4
      price-type: gold
      name: "&aPlanks"  
    - material: END_STONE
      amount: 12
      price: 24
      price-type: iron
      name: "&eEnd Stone"
    - material: SANDSTONE_STAIRS
      amount: 4 
      price: 12
      price-type: iron
      name: "&eLadder"
    - material: OBSIDIAN
      amount: 4
      price: 4
      price-type: emerald
      name: "&5Obsidian"
    - material: GLASS
      amount: 4
      price: 12
      price-type: iron
      name: "&fBlast-Proof Glass"

  # ==================== MELEE CATEGORY ====================
  melee:
    - material: STONE_SWORD
      price: 10
      price-type: iron
      name: "&fStone Sword"
    - material: IRON_SWORD
      price: 7
      price-type: gold
      name: "&fIron Sword"
    - material: DIAMOND_SWORD
      price: 4
      price-type: emerald
      name: "&fDiamond Sword"
    - material: STICK
      name: "&fKnockback Stick"
      price: 5
      price-type: gold
      enchants:
        knockback: 1

  # ==================== ARMOR CATEGORY ====================
  armor:
    - material: CHAINMAIL_BOOTS
      price: 40
      price-type: iron
      name: "&fPermanent Chainmail Armor"
      is-permanent: true
      armor-type: boots
    - material: IRON_BOOTS
      price: 12
      price-type: gold
      name: "&fPermanent Iron Armor"
      is-permanent: true
      armor-type: boots
    - material: DIAMOND_BOOTS
      price: 6
      price-type: emerald
      name: "&fPermanent Diamond Armor"
      is-permanent: true
      armor-type: boots

  # ==================== TOOLS CATEGORY ====================
  tools:
    - material: WOODEN_PICKAXE
      price: 10
      price-type: iron
      name: "&fWooden Pickaxe (Efficiency I)"
      enchants:
        efficiency: 1
    - material: IRON_PICKAXE
      price: 10
      price-type: iron
      name: "&fIron Pickaxe (Efficiency II)"
      enchants:
        efficiency: 2
    - material: GOLDEN_PICKAXE
      price: 3
      price-type: gold
      name: "&fGolden Pickaxe (Efficiency III)"
      enchants:
        efficiency: 3
      properties:
        sharpness: 2
    - material: DIAMOND_PICKAXE
      price: 6
      price-type: gold
      name: "&fDiamond Pickaxe (Efficiency III)"
      enchants:
        efficiency: 3
    - material: WOODEN_AXE
      price: 10
      price-type: iron
      name: "&fWooden Axe (Efficiency I)"
      enchants:
        efficiency: 1
    - material: STONE_AXE
      price: 10
      price-type: iron
      name: "&fStone Axe (Efficiency I)"
      enchants:
        efficiency: 1
    - material: IRON_AXE
      price: 3
      price-type: gold
      name: "&fIron Axe (Efficiency II)"
      enchants:
        efficiency: 2
    - material: DIAMOND_AXE
      price: 6
      price-type: gold
      name: "&fDiamond Axe (Efficiency III)"
      enchants:
        efficiency: 3
    - material: SHEARS
      price: 20
      price-type: iron
      name: "&fPermanent Shears"
      is-permanent: true

  # ==================== RANGED CATEGORY ====================
  ranged:
    - material: BOW
      price: 12
      price-type: gold
      name: "&fBow"
    - material: BOW
      price: 24
      price-type: gold
      name: "&fBow (Power I)"
      enchants:
        power: 1
    - material: BOW
      price: 6
      price-type: emerald
      name: "&fBow (Power I, Punch I)"
      enchants:
        power: 1
        punch: 1
    - material: ARROW
      amount: 8
      price: 2
      price-type: gold
      name: "&fArrows"

  # ==================== POTIONS CATEGORY ====================
  potions:
    - material: POTION
      price: 3
      price-type: emerald
      name: "&fSpeed II Potion (45s)"
      potion-effect: "speed:2:900"
    - material: POTION
      price: 1
      price-type: emerald
      name: "&fJump V Potion (45s)"
      potion-effect: "jump:5:900"
    - material: POTION
      price: 2
      price-type: emerald
      name: "&fInvisibility Potion (30s)"
      potion-effect: "invisibility:1:600"

  # ==================== UTILITY CATEGORY ====================
  utility:
    - material: GOLDEN_APPLE
      price: 3
      price-type: gold
      name: "&6Golden Apple"
    - material: SNOWBALL
      amount: 1
      price: 40
      price-type: iron
      name: "&fBridge Egg"
    - material: FIRE_CHARGE
      price: 40
      price-type: iron
      name: "&fFireball"
    - material: TNT
      price: 4
      price-type: gold
      name: "&fTNT"
    - material: ENDER_PEARL
      price: 4
      price-type: emerald
      name: "&fEnder Pearl"
    - material: CHEST
      price: 1
      price-type: gold
      name: "&fDream Defender (Iron Golem)"
    - material: STRING
      price: 24
      price-type: iron
      name: "&fBed Bug (Silverfish)"
    - material: SPONGE
      price: 4
      price-type: gold
      name: "&fSponge"
    - material: WATER_BUCKET
      price: 6
      price-type: gold
      name: "&fWater Bucket"
    - material: MILK_BUCKET
      price: 4
      price-type: gold
      name: "&fMagic Milk"
