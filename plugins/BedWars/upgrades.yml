# Screaming BedWars Team Upgrades - Hypixel Style
# =================================================
# Mimics Hypixel's team upgrade menu

upgrades:
  rows: 4
  name: "&8Team Upgrades"

  categories:
    # Sharpened Swords
    sharpness:
      name: "&aSharpened Swords"
      material: IRON_SWORD
      tiers:
        - price: 4
          price-type: diamond
          effect: "sharpness:1:sword"
          name: "&eSharpened Swords"
          lore:
            - "&7Your team permanently gains"
            - "&7Sharpness I on all swords!"
            - ""
            - "&7Cost: &b4 Diamonds"

    # Reinforced Armor
    protection:
      name: "&aReinforced Armor"
      material: IRON_CHESTPLATE
      tiers:
        - price: 2
          price-type: diamond
          effect: "protection:1:armor"
          name: "&eReinforced Armor I"
          lore:
            - "&7Your team permanently gains"
            - "&7Protection I on all armor!"
            - ""
            - "&7Cost: &b2 Diamonds"
        - price: 4
          price-type: diamond
          effect: "protection:2:armor"
          name: "&eReinforced Armor II"
          lore:
            - "&7Your team permanently gains"
            - "&7Protection II on all armor!"
            - ""
            - "&7Cost: &b4 Diamonds"
        - price: 8
          price-type: diamond
          effect: "protection:3:armor"
          name: "&eReinforced Armor III"
          lore:
            - "&7Your team permanently gains"
            - "&7Protection III on all armor!"
            - ""
            - "&7Cost: &b8 Diamonds"
        - price: 16
          price-type: diamond
          effect: "protection:4:armor"
          name: "&eReinforced Armor IV"
          lore:
            - "&7Your team permanently gains"
            - "&7Protection IV on all armor!"
            - ""
            - "&7Cost: &b16 Diamonds"

    # Maniac Miner (Haste)
    haste:
      name: "&aManiac Miner"
      material: GOLDEN_PICKAXE
      tiers:
        - price: 2
          price-type: diamond
          effect: "haste:1"
          name: "&eManiac Miner I"
          lore:
            - "&7All players on your team"
            - "&7permanently gain Haste I."
            - ""
            - "&7Cost: &b2 Diamonds"
        - price: 4
          price-type: diamond
          effect: "haste:2"
          name: "&eManiac Miner II"
          lore:
            - "&7All players on your team"
            - "&7permanently gain Haste II."
            - ""
            - "&7Cost: &b4 Diamonds"

    # Iron Forge (Generator upgrades)
    forge:
      name: "&aIron Forge"
      material: FURNACE
      tiers:
        - price: 2
          price-type: diamond
          effect: "spawner-boost:iron:50"
          name: "&eIron Forge"
          lore:
            - "&7Upgrade resource spawning on"
            - "&7your island by +50%."
            - ""
            - "&7Cost: &b2 Diamonds"
        - price: 4
          price-type: diamond
          effect: "spawner-boost:iron:100"
          name: "&eGolden Forge"
          lore:
            - "&7Upgrade resource spawning on"
            - "&7your island by +100%."
            - ""
            - "&7Cost: &b4 Diamonds"
        - price: 6
          price-type: diamond
          effect: "spawner-boost:emerald:100"
          name: "&eEmerald Forge"
          lore:
            - "&7Activates emerald spawning"
            - "&7on your island."
            - ""
            - "&7Cost: &b6 Diamonds"
        - price: 8
          price-type: diamond
          effect: "spawner-boost:iron:200"
          name: "&eMolten Forge"
          lore:
            - "&7Max resource generation."
            - "&7x2 resources."
            - ""
            - "&7Cost: &b8 Diamonds"

    # Heal Pool
    heal-pool:
      name: "&aHeal Pool"
      material: BEACON
      tiers:
        - price: 1
          price-type: diamond
          effect: "heal-pool:1"
          name: "&eHeal Pool"
          lore:
            - "&7Creates a Regeneration field"
            - "&7around your base!"
            - ""
            - "&7Cost: &b1 Diamond"

  # ========== TRAPS (Hypixel-style) ==========
  traps:
    rows: 1
    name: "&8Traps"

    categories:
      alarm-trap:
        name: "&cIt's a Trap!"
        material: TRIPWIRE_HOOK
        tiers:
          - price: 1
            price-type: diamond
            effect: "alarm-trap"
            name: "&eIt's a Trap!"
            lore:
              - "&7Inflicts Blindness and Slowness"
              - "&7for 8 seconds on the first"
              - "&7enemy that enters your base."
              - ""
              - "&7Cost: &b1 Diamond"

      counter-offensive:
        name: "&cCounter-Offensive Trap"
        material: FEATHER
        tiers:
          - price: 1
            price-type: diamond
            effect: "counter-offensive-trap"
            name: "&eCounter-Offensive Trap"
            lore:
              - "&7Grants Speed II and Jump Boost II"
              - "&7for 15 seconds to allied players"
              - "&7near your base."
              - ""
              - "&7Cost: &b1 Diamond"

      alarm:
        name: "&cAlarm Trap"
        material: REDSTONE_TORCH
        tiers:
          - price: 1
            price-type: diamond
            effect: "alarm"
            name: "&eAlarm Trap"
            lore:
              - "&7Reveals invisible players as"
              - "&7well as their name and team."
              - ""
              - "&7Cost: &b1 Diamond"

      miner-fatigue:
        name: "&cMiner Fatigue Trap"
        material: IRON_PICKAXE
        tiers:
          - price: 1
            price-type: diamond
            effect: "miner-fatigue-trap"
            name: "&eMiner Fatigue Trap"
            lore:
              - "&7Inflicts Mining Fatigue for"
              - "&710 seconds on the first"
              - "&7enemy that enters your base."
              - ""
              - "&7Cost: &b1 Diamond"
