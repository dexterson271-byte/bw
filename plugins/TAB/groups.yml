# TAB Groups - Rank prefixes for tab list and nametags
# These match the LuckPerms groups

owner:
  tabprefix: '&4[OWNER] &c'
  customtabname: '%player%'
  tagprefix: '&4[OWNER] &c'
  customtagname: '%player%'

admin:
  tabprefix: '&c[ADMIN] &6'
  customtabname: '%player%'
  tagprefix: '&c[ADMIN] &6'
  customtagname: '%player%'

mvp:
  tabprefix: '&b[MVP] &f'
  customtabname: '%player%'
  tagprefix: '&b[MVP] &f'
  customtagname: '%player%'

vip:
  tabprefix: '&a[VIP] &f'
  customtabname: '%player%'
  tagprefix: '&a[VIP] &f'
  customtagname: '%player%'

_DEFAULT_:
  tabprefix: '&7'
  customtabname: '%player%'
  tagprefix: '&7'
  customtagname: '%player%'
